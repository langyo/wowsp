[pytest]
testpaths = .
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
timeout = 120
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning:websockets
    ignore::DeprecationWarning:pytest_asyncio
markers =
    ui: Playwright browser UI tests
    mock: tests against the FastAPI mock backend
