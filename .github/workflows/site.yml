name: Deploy Site

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/site.yml'
      - 'packages/webui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'uno.config.ts'
      - 'eslint.config.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate shader bundle
        run: python scripts/glsl_bundle.py --verbose

      - name: Build site
        run: |
          cd packages/webui
          pnpm build --outDir ../../dist --emptyOutDir
          cd ../..
          cp docs/logo.webp dist/logo.webp
          touch dist/.nojekyll
          echo "wowsp.celestia.world" > dist/CNAME

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Retry deployment
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
