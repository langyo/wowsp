[package]
name = "wowsp_tauri"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "WoWSP — Tauri desktop shell"

[[bin]]
name = "wowsp"
path = "src/main.rs"

[dependencies]
# Data and serialization
serde.workspace = true
serde_json.workspace = true

# Error handling
anyhow.workspace = true
thiserror.workspace = true

# Async runtime
tokio.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber.workspace = true

# File watching (poll tempArenaInfo.json, replay dir)
notify.workspace = true

# Replay packet-stream decryption (Blowfish ECB + XOR chain + zlib)
blowfish.workspace = true
byteorder.workspace = true
flate2.workspace = true

# HTTP client for Wargaming public API lookups (M9)
reqwest.workspace = true

# Service supervision — graceful shutdown / signal handling
malkuth.workspace = true

# Windows registry scanning for game install detection (official / Lesta / 360)
winreg.workspace = true

# Windows screen capture for overlay roster positioning
windows.workspace = true

# AppData directory resolution
dirs-next.workspace = true

# Image handling for capture analysis
image.workspace = true

# Encoding
base64.workspace = true

# Tauri desktop shell
tauri.workspace = true
tauri-plugin-updater.workspace = true

# Workspace internal crates
wowsp_tauri_shared.workspace = true

[build-dependencies]
tauri-build.workspace = true

[features]
# This feature is required by `cargo tauri build` and is injected by default.
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
# Dev-only test control server. NEVER enable in release builds. Gates a
# localhost HTTP listener (see src/test_harness.rs) that lets external Python
# scripts drive eval_js + capture_main_window for visual regression testing.
# `cargo tauri build` does not pass this feature, so the control server is
# never compiled into shipped binaries.
test-harness = []
