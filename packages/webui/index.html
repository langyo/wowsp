<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>WoWSP — World of WarShip Panel</title>
    <style>
      html, body, #app { margin: 0; height: 100%; }
      #loading-screen {
        position: fixed; inset: 0; display: flex;
        align-items: center; justify-content: center;
        background: #0b1220; color: #cfe3ff;
        font-family: system-ui, sans-serif; z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="loading-screen">WoWSP loading…</div>
    <div id="app"></div>
    <!-- Custom title bar (Tauri only; self-guards in a browser) -->
    <script src="/tauri-titlebar.js"></script>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Hide the loading screen once the app has mounted.
      window.__loaderDismiss = function () {
        var el = document.getElementById('loading-screen');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function () { el.remove(); }, 400);
        }
      };
    </script>
  </body>
</html>
