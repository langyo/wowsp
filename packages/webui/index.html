<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WoWSP</title>
    <style>
      html, body, #app { margin: 0; height: 100%; }
      #loading-screen {
        position: fixed; inset: 0; display: flex;
        align-items: center; justify-content: center;
        background: var(--color-background, #0b1220); color: #cfe3ff;
        font-family: system-ui, sans-serif; z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="loading-screen">WoWSP loading…</div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Hide the loading screen once the app has mounted.
      window.__loaderDismiss = function () {
        const el = document.getElementById('loading-screen');
        if (el) {
          el.classList.add('hidden');
          setTimeout(() => el.remove(), 400);
        }
      };
    </script>
  </body>
</html>
