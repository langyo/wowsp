[advisories]
db-path = "~/.cargo/advisory-db"
vulnerability = "deny"
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
notice = "workspace"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "AGPL-3.0",
]
copyleft = "warn"
default = "deny"
confidence-threshold = 0.8

# WoWSP's own workspace crates are licensed under the Synthetic Source License
# 1.0 (SySL-1.0), which is not yet a registered SPDX identifier. cargo-deny
# cannot resolve it from the allow list, so we declare it explicitly here for
# the path-dependency crates that carry `license = "SySL-1.0"`.
[[licenses.exceptions]]
allow = ["SySL-1.0"]
name = "wowsp_tauri"
version = "*"

[[licenses.exceptions]]
allow = ["SySL-1.0"]
name = "wowsp_tauri_shared"
version = "*"

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
